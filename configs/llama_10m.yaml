seed: 42

data:
  paths:
    - data/fineweb10bt-10m
  seq_len: 512
  micro_batch_size: 1

model:
  type: llama
  vocab_size: 32000
  hidden_size: 384
  intermediate_size: 1536
  num_layers: 6
  num_heads: 6
  num_kv_heads: 6
  rms_norm_eps: 1.0e-5
  attention_backend: sdpa_auto
  activation_checkpointing: false
  activation_checkpoint_every_n_layers: 1

parallel:
  dp_size: 2
  tp_size: 2
  use_sp: true
  zero_stage: 3

training:
  max_steps: 250
  grad_accum_steps: 4
  lr: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-8
  fused_adamw: true
  lr_schedule: cosine
  warmup_steps: 20
  min_lr: 3.0e-5
  precision: bf16
  grad_clip: 1.0

logging:
  log_every: 1
  metrics_jsonl: logs/llama_10m.jsonl
  wandb_project: maltos
  wandb_run_name: llama-10m-dp2-tp2-sp-zero3
  wandb_run_id: null
  wandb_tags:
    - llama
    - 10m-tokens
    - smoke
  wandb_checkpoint_every: null

checkpoint:
  dir: checkpoints/llama_10m
  every: 50
  keep_last: 1
  keep_every_n_steps: 250
  min_free_gb: 5
  resume_from: null
