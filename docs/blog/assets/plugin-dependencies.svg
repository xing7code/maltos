<svg width="1100" height="650" viewBox="0 0 1100 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .edge { stroke: #334155; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L8 4.5 L1 8 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
  </defs>

  <rect width="1100" height="650" rx="28" fill="#f8fafc"/>
  <text x="58" y="68" class="title">Plugin Dependency Graph</text>
  <text x="58" y="96" class="subtitle">RuntimeCore topologically sorts plugins from declared ordering constraints.</text>

  <!-- Independent precision/metrics chain -->
  <rect x="95" y="150" width="180" height="64" rx="15" fill="#dbeafe" stroke="#2563eb" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="148" y="188" class="label">precision</text>

  <rect x="95" y="315" width="180" height="64" rx="15" fill="#ccfbf1" stroke="#0f766e" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="132" y="353" class="label">perf_metrics</text>

  <!-- Model-parallel chain -->
  <rect x="585" y="150" width="205" height="64" rx="15" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="631" y="188" class="label">tensor_parallel</text>

  <rect x="430" y="300" width="205" height="64" rx="15" fill="#ecfdf5" stroke="#059669" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="476" y="338" class="label">sequence_parallel</text>

  <!-- Sharding/reduction chain -->
  <rect x="602" y="455" width="170" height="64" rx="15" fill="#fef3c7" stroke="#d97706" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="664" y="493" class="label">zero3</text>

  <rect x="820" y="150" width="180" height="64" rx="15" fill="#fee2e2" stroke="#dc2626" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="870" y="188" class="label">bucket_ddp</text>

  <rect x="820" y="455" width="180" height="64" rx="15" fill="#fce7f3" stroke="#db2777" stroke-width="2.3" filter="url(#shadow)"/>
  <text x="872" y="493" class="label">grad_clip</text>

  <!-- Edges, exactly matching:
       precision -> perf_metrics
       tensor_parallel -> sequence_parallel
       tensor_parallel -> zero3
       sequence_parallel -> zero3
       bucket_ddp -> grad_clip
       zero3 -> grad_clip -->
  <path d="M185 214 C185 250 185 280 185 315" class="edge"/>
  <path d="M655 214 C610 245 565 270 532 300" class="edge"/>
  <path d="M688 214 C688 295 688 374 688 455" class="edge"/>
  <path d="M532 364 C560 405 615 438 660 455" class="edge"/>
  <path d="M910 214 C910 295 910 374 910 455" class="edge"/>
  <path d="M772 487 C787 487 802 487 820 487" class="edge"/>
</svg>
