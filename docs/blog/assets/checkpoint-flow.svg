<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .bi { stroke: #334155; stroke-width: 3; stroke-linecap: round; marker-start: url(#arrow-start); marker-end: url(#arrow-end); }
      .bi-purple { stroke: #7c3aed; stroke-width: 3; stroke-linecap: round; marker-start: url(#purple-start); marker-end: url(#purple-end); }
    </style>
    <marker id="arrow-end" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-start" markerWidth="12" markerHeight="12" refX="3" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M10 2 L2 6 L10 10 Z" fill="#334155"/>
    </marker>
    <marker id="purple-end" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="purple-start" markerWidth="12" markerHeight="12" refX="3" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M10 2 L2 6 L10 10 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="28" fill="#f8fafc"/>
  <text x="58" y="70" class="title">Checkpoint Save and Load</text>
  <text x="58" y="100" class="subtitle">StateManager is the single boundary between in-memory training state and rank-local checkpoint files.</text>

  <rect x="80" y="145" width="270" height="130" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="122" y="190" class="label">Runtime State</text>
  <text x="122" y="222" class="small">model params / shards</text>
  <text x="122" y="244" class="small">optimizer / scheduler</text>

  <rect x="80" y="325" width="270" height="115" rx="18" fill="#ecfdf5" stroke="#059669" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="122" y="370" class="label">Plugin States</text>
  <text x="122" y="402" class="small">TP / SP / ZeRO metadata</text>

  <rect x="80" y="490" width="270" height="105" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="122" y="532" class="label">Data State</text>
  <text x="122" y="564" class="small">shard index + token offset</text>

  <rect x="465" y="275" width="270" height="150" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="512" y="320" class="label">StateManager</text>
  <text x="512" y="352" class="small">collect / restore entries</text>
  <text x="512" y="374" class="small">logical metadata</text>
  <text x="512" y="396" class="small">plugin annotations</text>

  <rect x="850" y="190" width="280" height="320" rx="18" fill="#fff" stroke="#334155" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="900" y="236" class="label">step_00000200/</text>
  <text x="900" y="273" class="tiny">manifest.json</text>
  <text x="900" y="300" class="tiny">trainer_state.pt</text>
  <text x="900" y="340" class="tiny">rank_00000/</text>
  <text x="930" y="365" class="tiny">model.pt</text>
  <text x="930" y="390" class="tiny">optimizer.pt</text>
  <text x="900" y="430" class="tiny">rank_00001/</text>
  <text x="930" y="455" class="tiny">model.pt</text>
  <text x="930" y="480" class="tiny">optimizer.pt</text>

  <line x1="350" y1="210" x2="465" y2="320" class="bi-purple"/>
  <line x1="350" y1="382" x2="465" y2="360" class="bi-purple"/>
  <line x1="350" y1="542" x2="465" y2="395" class="bi-purple"/>

  <line x1="735" y1="360" x2="850" y2="360" class="bi"/>

  <text x="778" y="335" class="small">save</text>
  <text x="779" y="395" class="small">load</text>
</svg>
