<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
      .state { stroke: #7c3aed; stroke-width: 3; stroke-linecap: round; marker-end: url(#purple-arrow); }
      .metric { stroke: #0f766e; stroke-width: 3; stroke-linecap: round; marker-end: url(#teal-arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="purple-arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="teal-arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="60" y="68" class="title">Runtime Overview</text>
  <text x="60" y="96" class="subtitle">Execution, state, and metrics are separate paths around the same runtime core.</text>

  <!-- State path -->
  <rect x="180" y="150" width="220" height="92" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="225" y="188" class="label">DataLoader</text>
  <text x="225" y="215" class="small">token shards + cursor</text>

  <rect x="500" y="150" width="220" height="92" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="548" y="188" class="label">StateManager</text>
  <text x="548" y="215" class="small">save / restore boundary</text>

  <rect x="820" y="150" width="220" height="92" rx="16" fill="#f1f5f9" stroke="#475569" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="872" y="188" class="label">Checkpoints</text>
  <text x="872" y="215" class="small">rank-local files</text>

  <!-- Main execution path -->
  <rect x="110" y="305" width="220" height="106" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="173" y="349" class="label">Trainer</text>
  <text x="161" y="376" class="small">steps + policies</text>

  <rect x="490" y="300" width="240" height="116" rx="16" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="552" y="345" class="label">RuntimeCore</text>
  <text x="540" y="372" class="small">microbatch execution</text>
  <text x="558" y="394" class="small">phase hooks</text>

  <rect x="870" y="305" width="240" height="106" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="929" y="349" class="label">Plugins</text>
  <text x="918" y="376" class="small">precision, TP/SP, DDP, ZeRO</text>

  <!-- Metrics path -->
  <rect x="500" y="485" width="220" height="78" rx="16" fill="#ccfbf1" stroke="#0f766e" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="562" y="532" class="label">Metrics</text>

  <rect x="820" y="485" width="220" height="78" rx="16" fill="#fdf2f8" stroke="#db2777" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="874" y="519" class="label">Outputs</text>
  <text x="870" y="542" class="small">JSONL, W&amp;B, reports</text>

  <!-- Edges -->
  <line x1="330" y1="358" x2="490" y2="358" class="edge"/>
  <line x1="730" y1="358" x2="870" y2="358" class="edge"/>

  <line x1="400" y1="196" x2="500" y2="196" class="state"/>
  <line x1="720" y1="196" x2="820" y2="196" class="state"/>
  <line x1="610" y1="300" x2="610" y2="242" class="state"/>

  <line x1="610" y1="416" x2="610" y2="485" class="metric"/>
  <line x1="720" y1="524" x2="820" y2="524" class="metric"/>

  <text x="350" y="338" class="small">batches</text>
  <text x="758" y="338" class="small">phase hooks</text>
  <text x="430" y="176" class="small">cursor</text>
  <text x="626" y="272" class="small">runtime + plugin states</text>
  <text x="742" y="176" class="small">manifest</text>
</svg>
