name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CPU smoke tests
        env:
          PYTHONPATH: .
        run: |
          python tests/smoke_runtime_core.py
          python tests/smoke_trainer_loop.py

      - name: Run tiny pretraining smoke
        env:
          PYTHONPATH: .
        run: |
          python tools/pretrain.py \
            --model tiny \
            --data tests/testdata \
            --vocab-size 256 \
            --dim 32 \
            --n-heads 4 \
            --hidden-size 64 \
            --n-layers 1 \
            --seq-len 16 \
            --micro-batch-size 1 \
            --max-steps 2 \
            --log-every 1

  distributed-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run distributed regression subset
        env:
          PYTHONPATH: .
          OMP_NUM_THREADS: "1"
          GLOO_SOCKET_IFNAME: lo
        run: |
          python tests/tiny_model_ddp_runtime_core_equivalence.py \
            --ddp-mode naive \
            --master-port 29555

          python tests/tiny_model_zero_runtime_core_equivalence.py \
            --zero-stage 1 \
            --master-port 29566

          python tests/tiny_model_zero_runtime_core_equivalence.py \
            --zero-stage 2 \
            --master-port 29582

          python tests/tiny_model_zero_runtime_core_equivalence.py \
            --zero-stage 3 \
            --master-port 29611

          python tests/tiny_model_zero_runtime_core_equivalence.py \
            --zero-stage 3 \
            --grad-accum-steps 2 \
            --master-port 29612

          python tests/tiny_model_zero_grad_clip_equivalence.py \
            --zero-stage 1 \
            --master-port 29613

          python tests/tiny_model_zero_grad_clip_equivalence.py \
            --zero-stage 2 \
            --master-port 29614

          python tests/tiny_model_zero_grad_clip_equivalence.py \
            --zero-stage 3 \
            --master-port 29615

          python tests/tiny_model_zero3_checkpoint_resume.py \
            --master-port 29616

          python tests/tiny_model_zero3_checkpoint_roundtrip.py \
            --master-port 29617

          python tests/tiny_transformer_tp_checkpoint_manifest.py \
            --master-port 29618
